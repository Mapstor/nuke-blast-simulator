<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background -->
  <rect width="1200" height="630" fill="#0a0a0a"/>
  
  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00ff41" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Main title -->
  <text x="600" y="200" font-family="Arial, sans-serif" font-size="72" font-weight="bold" text-anchor="middle" fill="#00ff41">
    Nuclear Blast Simulator
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="260" font-family="Arial, sans-serif" font-size="32" text-anchor="middle" fill="#00ff99">
    Interactive nuclear blast effects calculator
  </text>
  
  <!-- Large atom symbol in center -->
  <g transform="translate(600, 380)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="80" fill="none" stroke="#00ff41" stroke-width="3"/>
    
    <!-- Atom nucleus -->
    <circle cx="0" cy="0" r="12" fill="#ffff00"/>
    
    <!-- Three electron orbits -->
    <ellipse cx="0" cy="0" rx="60" ry="30" fill="none" stroke="#00ff41" stroke-width="3" opacity="0.9"/>
    <ellipse cx="0" cy="0" rx="60" ry="30" fill="none" stroke="#00ff41" stroke-width="3" opacity="0.9" transform="rotate(60)"/>
    <ellipse cx="0" cy="0" rx="60" ry="30" fill="none" stroke="#00ff41" stroke-width="3" opacity="0.9" transform="rotate(120)"/>
    
    <!-- Electrons -->
    <circle cx="60" cy="0" r="6" fill="#00ff41"/>
    <circle cx="-60" cy="0" r="6" fill="#00ff41"/>
    <circle cx="30" cy="-52" r="6" fill="#00ff41"/>
    <circle cx="-30" cy="52" r="6" fill="#00ff41"/>
    <circle cx="30" cy="52" r="6" fill="#00ff41"/>
    <circle cx="-30" cy="-52" r="6" fill="#00ff41"/>
  </g>
  
  <!-- Domain name -->
  <text x="600" y="560" font-family="Arial, sans-serif" font-size="28" text-anchor="middle" fill="#00ff99">
    NukeBlastSimulator.com
  </text>
  
  <!-- Educational disclaimer -->
  <text x="600" y="590" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#888888">
    Educational tool for nuclear disarmament awareness
  </text>
</svg>